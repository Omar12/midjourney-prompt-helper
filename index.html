<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Midjourney Prompt Helper</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://openrouter.ai; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:">
    <!-- Stored choice wins, else follow OS preference. Runs before paint (no flash). -->
    <script>
      (function () {
        var stored = localStorage.getItem('theme')
        var mq = window.matchMedia('(prefers-color-scheme: dark)')
        var apply = function () {
          var dark = stored ? stored === 'dark' : mq.matches
          document.documentElement.classList.toggle('dark', dark)
        }
        apply()
        // Only track OS changes while the user hasn't picked a manual override.
        mq.addEventListener('change', function () { if (!stored) apply() })
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
